name: Deploy Benchboard to GitHub Pages

on:
  push:
    branches: [main, pipeline/v3-correctness]
  workflow_dispatch:

# Per GitHub's Pages guidance: allow one deployment at a time but let an
# in-progress production deploy finish. Cancelling it mid-flight makes
# actions/deploy-pages fail (which is what broke the last three deploys).
concurrency:
  group: benchboard-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: benchpress/benchboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: benchpress/benchboard/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          BENCHPRESS_RUN_DIR: ${{ github.workspace }}/results/part2_experiment/run_cv_20260703_182036
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: benchpress/benchboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
